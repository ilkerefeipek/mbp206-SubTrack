name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore

      - name: Verify formatting
        run: dotnet format --verify-no-changes --severity warn

      - name: Build (warnings as errors)
        run: dotnet build --no-restore --configuration Release /p:TreatWarningsAsErrors=true

      - name: Run tests
        run: dotnet test --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/TestResults/*.trx'

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: '**/TestResults/**/coverage.cobertura.xml'

      - name: Validate EF migrations bundle
        run: dotnet ef migrations bundle --project src/Infrastructure --startup-project src/Api --self-contained --runtime win-x64 --output ./efbundle.exe --force
        continue-on-error: true
